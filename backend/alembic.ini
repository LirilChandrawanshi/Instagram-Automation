# Alembic configuration for Instagram Automation backend
# Database URL is set from app.config in env.py

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Use generic URL; env.py overrides from app.config
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/instagram_automation

[post_write_hooks]
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
